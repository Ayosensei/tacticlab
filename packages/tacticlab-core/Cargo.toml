[package]
name = "tacticlab-core"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
petgraph = "0.6"
quick-xml = { version = "0.31", features = ["serialize"] }
tokio = { version = "1.0", features = ["full"], optional = true }
axum = { version = "0.7", optional = true }

[features]
default = []
service = ["tokio", "axum"]
